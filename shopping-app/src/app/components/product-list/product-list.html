<div class="product-container">
    <div class="product-index">
        <ul *ngFor="let item of items">
            <!--Links item images to "product-item-detail" Webpage-->
            <!--(click)="submitChosenItem(item.id)" - Submits Chosen Item to "product-item" Component once item Image is Clicked On-->
            <a (click)="submitChosenItem(item.id)" routerLink="/item-details">
                <img src="{{ item.url }}" alt="Image URL" style="width: 300px;">
            </a>
            <br>

            <!--MUST USE "<div class="product-container">" for item Name & Price SEPARATELY-->
            <!--Otherwise Item Name & Price will be on Same Line-->
            <!--Or Only Item Name will Only Be Centered whereas Price will be Aligned to the Left-->
            <div class="product-container">
                <a>{{ item.name }}</a>
                <br>
            </div>
            <div class="product-container">
                <a>${{ item.price }}</a>
            </div>

            <div class="product-container">
                <a>Purchase Amount: {{ itemAmount }}</a>
            </div>

            <!--TEMP: Figure out how to SEPARATE Specific Item Amounts FROM EACH OTHER-->
            <!--TEMP: KEEP "button" for Increasing & Decreasing items for cart OR CHANGE it?-->
            <div class="product-container">
                <button class="btn btn-primary" (click)="increaseAmount()">+</button>
                <button class="btn btn-primary" (click)="decreaseAmount()">-</button>
            </div>
        </ul>
    </div>
</div>
