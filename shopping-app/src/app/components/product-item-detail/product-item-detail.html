<!--Child HTML Files ALWAYS Display Content for Parent HTML Files-->
<!--Parent HTML Files Access Child HTML Files to Display their Content-->

<!--MUST Iterate Through List of All Items HERE to Obtain Chosen Item Details-->
<!--Iterating Through List of All Items in "product-item-detail.ts" File Requires MORE COMPLEX CODE-->
<!--Uses "AsyncPipe" Observable-->
<ul *ngFor="let chosenItem of (allItems$ | async)">

    <!--Obtains Details of Chosen Item WHILE Preventing "chosenItem" from Resetting-->
    <div *ngIf="chosenItem.id == chosenItemId">

        <div class="detail-container">
            <div class="img">
                <img src="{{ chosenItem.url }}" alt="Image URL">
            </div>
            
            <!--MUST KEEP Image & Details WITHIN SAME class="detail-container" to Display Webpage as Shown-->
            <div class="detail-item">
                <div class="select-input">
                    <h2>{{ chosenItem.name }}</h2>
                </div>
                <div class="select-input">
                    <h6>${{ chosenItem.price }}</h6>
                </div>
                <h6>{{ chosenItem.description }}</h6>
                
                <a>Purchase Amount: {{ itemAmount }}</a>
                
                <!--TEMP: KEEP "button" for Increasing & Decreasing items for cart OR CHANGE it?-->
                <div class="select-input">
                    <button class="btn btn-primary" (click)="increaseAmount()">+</button>
                    <button class="btn btn-primary" (click)="decreaseAmount()">-</button>
                </div>

                <div class="select-input">
                    <button class="btn btn-primary" (click)="recordItemPurchaseAmount(chosenItem.id)">Add to cart</button>
                </div>

                <div class="back-link">
                    <a href="http://localhost:4200/" routerLink="/">Back to product list</a>
                </div>
            </div>
        </div>
    </div>
</ul>
